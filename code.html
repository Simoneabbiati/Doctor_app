<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Writer | OpenAI Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --apple-bg: #F5F5F7; --apple-card: rgba(255, 255, 255, 0.8); --apple-text: #1d1d1f; --apple-accent: #0071e3; }
        body { font-family: 'Inter', sans-serif; background-color: var(--apple-bg); color: var(--apple-text); overflow: hidden; -webkit-font-smoothing: antialiased; }
        .font-serif { font-family: 'Instrument Serif', serif; }
        .glass-sidebar { background: rgba(245, 245, 247, 0.7); backdrop-filter: saturate(180%) blur(20px); border-right: 1px solid rgba(0, 0, 0, 0.05); }
        .glass-card { background: var(--apple-card); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.04); }
        .premium-input { background: rgba(0, 0, 0, 0.03); border: 1px solid transparent; transition: all 0.3s ease; }
        .premium-input:focus { background: white; border-color: rgba(0, 0, 0, 0.1); }
        .progress-bar { transition: width 1s cubic-bezier(0.65, 0, 0.35, 1); }
        textarea { caret-color: var(--apple-accent); scrollbar-width: none; resize: none; outline: none; }
        .animate-fade { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                play: <path d="M5 3l14 9-14 9V3z" fill="currentColor" />,
                pause: <React.Fragment><rect x="6" y="4" width="4" height="16" fill="currentColor" /><rect x="14" y="4" width="4" height="16" fill="currentColor" /></React.Fragment>,
                refresh: <path d="M1 4v6h6M23 20v-6h-6M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15" />,
                target: <React.Fragment><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></React.Fragment>,
                sparkles: <path d="M12 3l1.91 5.82L20 10.73l-4.45 3.55L17.09 21 12 17.27 6.91 21l1.54-6.72L4 10.73l6.09-1.91L12 3z" />,
                swords: <path d="M14.5 17.5L12 20l-5-5 2.5-2.5m10-10L12 10m7.5-2.5L12 13M5 19l4-4" />,
                check: <path d="M20 6L9 17l-5-5" />,
                feather: <path d="M20.24 12.24a6 6 0 00-8.49-8.49L5 10.5V19h8.5zM16 8L2 22M17.5 15H9" />,
                settings: <React.Fragment><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" /></React.Fragment>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={className}>{icons[name] || null}</svg>;
        };

        const App = () => {
            const [timeLeft, setTimeLeft] = useState(25 * 60);
            const [isActive, setIsActive] = useState(false);
            const [text, setText] = useState("");
            const [ghostSuggestion, setGhostSuggestion] = useState("");
            const [monsterTask, setMonsterTask] = useState("");
            const [subTasks, setSubTasks] = useState([]);
            const [aiInsights, setAiInsights] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [isSuggesting, setIsSuggesting] = useState(false);
            
            const timerRef = useRef(null);
            const ghostTimeoutRef = useRef(null);

            const wordCount = useMemo(() => text.trim().split(/\s+/).filter(w => w.length > 0).length, [text]);
            const progress = Math.min((wordCount / 500) * 100, 100);

            useEffect(() => {
                if (isActive && timeLeft > 0) timerRef.current = setInterval(() => setTimeLeft(t => t - 1), 1000);
                else clearInterval(timerRef.current);
                return () => clearInterval(timerRef.current);
            }, [isActive, timeLeft]);

            useEffect(() => {
                if (text.endsWith('\n') && wordCount > 3) {
                    clearTimeout(ghostTimeoutRef.current);
                    ghostTimeoutRef.current = setTimeout(fetchSuggestion, 1500);
                }
            }, [text]);

            const callOpenAI = async (messages, maxTokens = 100) => {
                const key = localStorage.getItem('openai_key');
                if (!key) { alert("Inserisci la tua API Key di OpenAI nelle impostazioni!"); return null; }
                
                try {
                    const response = await fetch("https://api.openai.com/v1/chat/completions", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
                        body: JSON.stringify({
                            model: "gpt-4o-mini",
                            messages: messages,
                            max_tokens: maxTokens,
                            temperature: 0.7
                        })
                    });
                    const data = await response.json();
                    return data.choices[0].message.content;
                } catch (e) { console.error(e); return null; }
            };

            const fetchSuggestion = async () => {
                setIsSuggesting(true);
                const res = await callOpenAI([
                    { role: "system", content: "Sei un co-scrittore. Continua il testo dell'utente suggerendo SOLO LA PROSSIMA FRASE. Sii breve e poetico. Non aggiungere commenti." },
                    { role: "user", content: text.slice(-300) }
                ], 50);
                if (res) setGhostSuggestion(res.trim());
                setIsSuggesting(false);
            };

            const analyzeWriting = async () => {
                setIsAnalyzing(true);
                const res = await callOpenAI([
                    { role: "system", content: "Analizza il testo. Rispondi SOLO con un JSON: {\"essence\": \"una frase sul cuore del testo\", \"socraticQuestion\": \"una domanda per l'autore\"}" },
                    { role: "user", content: text }
                ]);
                try { setAiInsights(JSON.parse(res)); } catch(e) {}
                setIsAnalyzing(false);
            };

            const decomposeTask = async () => {
                setIsAnalyzing(true);
                const res = await callOpenAI([
                    { role: "system", content: "Scomponi l'obiettivo in 4 micro-azioni. Rispondi SOLO JSON: {\"steps\": [\"azione 1\", \"azione 2\", \"azione 3\", \"azione 4\"]}" },
                    { role: "user", content: monsterTask }
                ]);
                try { 
                    const data = JSON.parse(res);
                    setSubTasks(data.steps.map(s => ({ text: s, done: false })));
                    setMonsterTask("");
                } catch(e) {}
                setIsAnalyzing(false);
            };

            return (
                <div className="flex h-screen bg-[#F5F5F7]">
                    <aside className="w-[340px] glass-sidebar flex flex-col p-8 space-y-10 overflow-y-auto no-scrollbar">
                        <div className="flex justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 bg-black rounded-xl flex items-center justify-center text-white"><Icon name="feather" size={18} /></div>
                                <h1 className="text-sm font-semibold tracking-tight uppercase">Minisla Studio</h1>
                            </div>
                            <button onClick={() => {const k=prompt("OpenAI API Key:"); if(k) localStorage.setItem('openai_key', k)}} className="p-2 hover:bg-black/5 rounded-lg"><Icon name="settings" size={16}/></button>
                        </div>

                        <div className="space-y-6">
                            <div className="flex justify-between text-[11px] font-bold text-[#86868b] uppercase tracking-widest">
                                <span>Focus Session</span>
                                <span className="font-mono">{Math.floor(timeLeft/60)}:{(timeLeft%60).toString().padStart(2,'0')}</span>
                            </div>
                            <button onClick={() => setIsActive(!isActive)} className="w-full h-11 rounded-xl bg-black text-white text-[13px] font-medium flex items-center justify-center gap-2">
                                <Icon name={isActive ? "pause" : "play"} size={14} /> {isActive ? "Pausa" : "Inizia"}
                            </button>
                        </div>

                        <div className="space-y-6">
                            <h3 className="text-[11px] font-bold text-[#86868b] uppercase tracking-widest border-b pb-4">Azioni Atomiche</h3>
                            {subTasks.length === 0 ? (
                                <div className="relative">
                                    <input type="text" value={monsterTask} onChange={(e)=>setMonsterTask(e.target.value)} onKeyDown={(e)=>e.key==='Enter'&&decomposeTask()} placeholder="Cosa sconfiggiamo?" className="w-full h-12 premium-input rounded-xl px-4 text-[13px]" />
                                    <button onClick={decomposeTask} className="absolute right-3 top-3 text-[#86868b]"><Icon name="sparkles" size={14}/></button>
                                </div>
                            ) : (
                                <div className="space-y-2">
                                    {subTasks.map((t, i) => (
                                        <div key={i} onClick={()=>{const n=[...subTasks]; n[i].done=!n[i].done; setSubTasks(n)}} className={`flex items-center gap-3 p-3.5 rounded-xl border cursor-pointer ${t.done ? 'bg-black/5 opacity-50' : 'bg-white'}`}>
                                            <div className={`w-4 h-4 rounded-full border ${t.done ? 'bg-black' : ''}`}></div>
                                            <span className={`text-[12px] ${t.done ? 'line-through' : ''}`}>{t.text}</span>
                                        </div>
                                    ))}
                                    <button onClick={()=>setSubTasks([])} className="w-full text-[10px] font-bold uppercase pt-2">Nuova Strategia</button>
                                </div>
                            )}
                        </div>

                        <div className="glass-card p-5 rounded-2xl">
                            <div className="flex items-center gap-2 mb-3 text-[10px] font-bold text-[#86868b] uppercase tracking-widest">
                                <div className="w-2 h-2 rounded-full bg-blue-500"></div> AI Insight
                            </div>
                            {aiInsights ? (
                                <div className="space-y-3">
                                    <p className="text-[12px] italic font-medium">"{aiInsights.essence}"</p>
                                    <p className="text-[10px] text-[#86868b] pt-2 border-t font-mono">{aiInsights.socraticQuestion}</p>
                                </div>
                            ) : <p className="text-[11px] text-[#86868b]">Usa 'Analisi Profonda' per sbloccare l'IA.</p>}
                        </div>
                    </aside>

                    <main className="flex-grow flex flex-col bg-white relative">
                        <header className="h-[72px] px-12 flex items-center justify-between border-b">
                            <div className="flex flex-col">
                                <span className="text-[10px] font-bold text-[#86868b] uppercase tracking-widest mb-1">Pensiero</span>
                                <div className="flex items-center gap-4">
                                    <span className="text-xl font-semibold tabular-nums">{wordCount}</span>
                                    <div className="w-32 h-1 bg-black/5 rounded-full overflow-hidden"><div className="h-full bg-black progress-bar" style={{width:`${progress}%`}}></div></div>
                                </div>
                            </div>
                            <button onClick={analyzeWriting} disabled={isAnalyzing || wordCount < 5} className="h-9 px-6 bg-[#F5F5F7] text-[12px] font-semibold rounded-full hover:bg-black/5">
                                {isAnalyzing ? "Analisi..." : "Analisi Profonda"}
                            </button>
                        </header>

                        <div className="flex-grow overflow-y-auto pt-24 pb-48 px-12 no-scrollbar">
                            <div className="max-w-2xl mx-auto relative">
                                <textarea value={text} onChange={(e)=>{setText(e.target.value); setGhostSuggestion("")}} onKeyDown={(e)=>{if(e.key==='Tab'&&ghostSuggestion){e.preventDefault(); setText(t=>t+(t.endsWith('\n')?'':' ')+ghostSuggestion); setGhostSuggestion("")}}} placeholder="Inizia la tua visione..." className="w-full min-h-[50vh] bg-transparent font-serif text-3xl md:text-4xl leading-[1.6]" spellCheck="false" autoFocus />
                                {ghostSuggestion && (
                                    <div className="mt-8 p-6 bg-blue-50/50 border border-blue-100 rounded-2xl animate-fade">
                                        <p className="font-serif text-2xl text-blue-900/60 italic leading-relaxed">{ghostSuggestion}</p>
                                        <div className="mt-4 flex gap-3">
                                            <button onClick={()=>{setText(t=>t+" "+ghostSuggestion); setGhostSuggestion("")}} className="px-4 py-2 bg-blue-600 text-white text-[10px] font-bold rounded-lg uppercase">Accetta [TAB]</button>
                                            <button onClick={()=>setGhostSuggestion("")} className="px-4 py-2 bg-white text-blue-600 border border-blue-200 text-[10px] font-bold rounded-lg uppercase">Ignora</button>
                                        </div>
                                    </div>
                                )}
                                {isSuggesting && <div className="mt-4 text-[10px] text-[#86868b] animate-pulse uppercase tracking-widest">ChatGPT sta riflettendo...</div>}
                            </div>
                        </div>

                        <div className="absolute bottom-10 left-1/2 -translate-x-1/2">
                            <div className="px-8 py-3.5 glass-card rounded-2xl flex items-center gap-10 border border-black/5">
                                <div className="text-center"><p className="text-[9px] font-bold text-[#86868b] uppercase mb-0.5">Lettura</p><p className="text-[13px] font-semibold">{Math.ceil(wordCount/180)}m</p></div>
                                <div className="w-px h-7 bg-black/5"></div>
                                <div className="text-center"><p className="text-[9px] font-bold text-[#86868b] uppercase mb-0.5">Focus</p><p className={`text-[13px] font-semibold ${isActive?'text-blue-600':''}`}>{isActive?'Deep':'Pausa'}</p></div>
                                <div className="w-px h-7 bg-black/5"></div>
                                <div className="text-center"><p className="text-[9px] font-bold text-[#86868b] uppercase mb-0.5">Complessità</p><p className="text-[13px] font-semibold">{(wordCount/12).toFixed(1)}</p></div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
