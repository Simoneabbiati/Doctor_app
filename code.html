<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Writer | Cloud Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --apple-bg: #F5F5F7; --apple-card: rgba(255, 255, 255, 0.8); --apple-text: #1d1d1f; --apple-accent: #0071e3; }
        body { font-family: 'Inter', sans-serif; background-color: var(--apple-bg); color: var(--apple-text); overflow: hidden; }
        .font-serif { font-family: 'Instrument Serif', serif; }
        .glass-sidebar { background: rgba(245, 245, 247, 0.7); backdrop-filter: saturate(180%) blur(20px); border-right: 1px solid rgba(0, 0, 0, 0.05); }
        .glass-card { background: var(--apple-card); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.04); }
        .premium-input { background: rgba(0, 0, 0, 0.03); transition: all 0.3s ease; }
        .premium-input:focus { background: white; border-color: rgba(0, 0, 0, 0.1); }
        textarea { caret-color: var(--apple-accent); scrollbar-width: none; }
        .animate-fade { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                play: <path d="M5 3l14 9-14 9V3z" fill="currentColor" />,
                pause: <React.Fragment><rect x="6" y="4" width="4" height="16" fill="currentColor" /><rect x="14" y="4" width="4" height="16" fill="currentColor" /></React.Fragment>,
                refresh: <path d="M1 4v6h6M23 20v-6h-6M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15" />,
                target: <React.Fragment><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></React.Fragment>,
                sparkles: <path d="M12 3l1.91 5.82L20 10.73l-4.45 3.55L17.09 21 12 17.27 6.91 21l1.54-6.72L4 10.73l6.09-1.91L12 3z" />,
                swords: <path d="M14.5 17.5L12 20l-5-5 2.5-2.5m10-10L12 10m7.5-2.5L12 13M5 19l4-4" />,
                check: <path d="M20 6L9 17l-5-5" />,
                feather: <path d="M20.24 12.24a6 6 0 00-8.49-8.49L5 10.5V19h8.5zM16 8L2 22M17.5 15H9" />,
                settings: <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />,
                magic: <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />,
                chevronRight: <path d="M9 18l6-6-6-6" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [timeLeft, setTimeLeft] = useState(25 * 60);
            const [isActive, setIsActive] = useState(false);
            const [text, setText] = useState("");
            const [ghostSuggestion, setGhostSuggestion] = useState("");
            const [monsterTask, setMonsterTask] = useState("");
            const [subTasks, setSubTasks] = useState([]);
            const [aiInsights, setAiInsights] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [isSuggesting, setIsSuggesting] = useState(false);
            
            const ghostTimeoutRef = useRef(null);
            const HF_MODEL = "mistralai/Mistral-7B-Instruct-v0.3";

            const wordCount = useMemo(() => text.trim().split(/\s+/).filter(w => w.length > 0).length, [text]);
            const progress = Math.min((wordCount / 500) * 100, 100);

            // Logica API Hugging Face
            const callHF = async (prompt, system) => {
                const token = localStorage.getItem('hf_token');
                if (!token) return null;

                try {
                    const response = await fetch(`https://api-inference.huggingface.co/models/${HF_MODEL}`, {
                        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
                        method: "POST",
                        body: JSON.stringify({
                            inputs: `<s>[INST] ${system} \n\n Testo: ${prompt} [/INST]`,
                            parameters: { max_new_tokens: 60, temperature: 0.7 }
                        }),
                    });
                    const result = await response.json();
                    let output = result[0]?.generated_text || "";
                    return output.split('[/INST]').pop().trim();
                } catch (e) { console.error(e); return null; }
            };

            useEffect(() => {
                if (text.endsWith('\n') && wordCount > 5) {
                    if (ghostTimeoutRef.current) clearTimeout(ghostTimeoutRef.current);
                    ghostTimeoutRef.current = setTimeout(fetchSuggestion, 1500);
                }
                return () => clearTimeout(ghostTimeoutRef.current);
            }, [text]);

            const fetchSuggestion = async () => {
                if (isSuggesting) return;
                setIsSuggesting(true);
                const lastLine = text.split('\n').filter(l => l.trim()).slice(-2).join('. ');
                const res = await callHF(lastLine, "Sei un co-scrittore. Suggerisci solo la PRIMA FRASE successiva per continuare il testo. Sii breve e poetico. Non aggiungere altro.");
                if (res) setGhostSuggestion(res.split('\n')[0]);
                setIsSuggesting(false);
            };

            const analyzeWriting = async () => {
                setIsAnalyzing(true);
                const res = await callHF(text, "Analizza questo testo. Restituisci JSON: { \"essence\": \"cuore del testo\", \"socraticQuestion\": \"domanda profonda\" }");
                try { 
                    const cleanRes = res.substring(res.indexOf('{'), res.lastIndexOf('}') + 1);
                    setAiInsights(JSON.parse(cleanRes)); 
                } catch(e) {}
                setIsAnalyzing(false);
            };

            const saveToken = () => {
                const t = prompt("Inserisci il tuo Hugging Face Access Token (Read):");
                if (t) {
                    localStorage.setItem('hf_token', t);
                    alert("Token salvato localmente!");
                }
            };

            return (
                <div className="flex h-screen bg-[#F5F5F7] text-[#1d1d1f]">
                    <aside className="w-[340px] glass-sidebar flex flex-col h-full z-20">
                        <div className="p-8 space-y-10 flex-grow overflow-y-auto no-scrollbar">
                            <div className="flex items-center justify-between animate-fade">
                                <div className="flex items-center gap-3">
                                    <div className="w-9 h-9 bg-[#1d1d1f] rounded-xl flex items-center justify-center text-white"><Icon name="feather" size={18} /></div>
                                    <h1 className="text-sm font-semibold tracking-tight uppercase">Minisla Studio</h1>
                                </div>
                                <button onClick={saveToken} className="p-2 hover:bg-black/5 rounded-lg text-[#86868b]"><Icon name="settings" size={16} /></button>
                            </div>

                            {/* Timer Section */}
                            <div className="space-y-6">
                                <div className="flex justify-between items-baseline">
                                    <h2 className="text-[11px] font-bold text-[#86868b] uppercase tracking-widest">Focus Session</h2>
                                    <span className="font-mono text-xs text-[#86868b]">{Math.floor(timeLeft/60)}:{(timeLeft%60).toString().padStart(2,'0')}</span>
                                </div>
                                <button onClick={() => setIsActive(!isActive)} className="w-full h-11 rounded-xl bg-black text-white text-[13px] font-medium flex items-center justify-center gap-2">
                                    <Icon name={isActive ? "pause" : "play"} size={14} /> {isActive ? "Pausa" : "Inizia Focus"}
                                </button>
                            </div>

                            {/* AI Insights Sidebar */}
                            <div className="glass-card p-5 rounded-2xl">
                                <div className="flex items-center gap-2 mb-3">
                                    <div className="w-2 h-2 rounded-full bg-blue-500"></div>
                                    <span className="text-[10px] font-bold uppercase tracking-widest text-[#86868b]">Cloud Insight</span>
                                </div>
                                {aiInsights ? (
                                    <div className="space-y-4">
                                        <p className="text-[12px] italic font-medium">"{aiInsights.essence}"</p>
                                        <p className="text-[10px] text-[#86868b]"><span className="text-black font-bold uppercase">Socratic:</span> {aiInsights.socraticQuestion}</p>
                                    </div>
                                ) : <p className="text-[11px] text-[#86868b]">Scrivi e clicca 'Analisi' per ricevere feedback dal cloud.</p>}
                            </div>
                        </div>
                    </aside>

                    <main className="flex-grow flex flex-col bg-white relative">
                        <header className="h-[72px] px-12 flex items-center justify-between border-b border-[#F5F5F7]">
                            <div className="flex flex-col">
                                <span className="text-[10px] font-bold text-[#86868b] uppercase tracking-widest">Volume Parole</span>
                                <span className="text-xl font-semibold tabular-nums">{wordCount}</span>
                            </div>
                            <button onClick={analyzeWriting} disabled={isAnalyzing || wordCount < 5} className="h-9 px-6 bg-[#F5F5F7] text-[12px] font-semibold rounded-full hover:bg-[#E8E8ED] disabled:opacity-30 transition-all">
                                {isAnalyzing ? "Connessione..." : "Analisi Profonda"}
                            </button>
                        </header>

                        <div className="flex-grow overflow-y-auto no-scrollbar">
                            <div className="max-w-2xl mx-auto pt-24 pb-48 px-8">
                                <textarea 
                                    value={text}
                                    onChange={(e) => { setText(e.target.value); setGhostSuggestion(""); }}
                                    onKeyDown={(e) => { if(e.key === 'Tab' && ghostSuggestion) { e.preventDefault(); setText(t => t + ghostSuggestion); setGhostSuggestion(""); } }}
                                    placeholder="Inizia a scrivere..."
                                    className="w-full min-h-[50vh] bg-transparent border-none outline-none font-serif text-3xl leading-[1.6] resize-none placeholder:text-[#E8E8ED]"
                                    spellCheck="false" autoFocus
                                />
                                
                                {ghostSuggestion && (
                                    <div className="mt-8 p-6 bg-blue-50/50 border border-blue-100 rounded-2xl animate-fade">
                                        <p className="font-serif text-2xl text-blue-900/60 italic">{ghostSuggestion}</p>
                                        <div className="mt-4 flex gap-3">
                                            <button onClick={() => {setText(t => t + ghostSuggestion); setGhostSuggestion("");}} className="px-4 py-2 bg-blue-600 text-white text-[10px] font-bold rounded-lg uppercase">Accetta [TAB]</button>
                                            <button onClick={() => setGhostSuggestion("")} className="px-4 py-2 bg-white text-blue-600 text-[10px] font-bold rounded-lg border border-blue-200 uppercase">Ignora</button>
                                        </div>
                                    </div>
                                )}
                                {isSuggesting && <div className="mt-4 text-[10px] text-[#86868b] animate-pulse uppercase tracking-widest">L'IA sta riflettendo...</div>}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
