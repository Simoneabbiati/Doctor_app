<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Pomodoro - Apple Style</title>
    <!-- Tailwind CSS per lo styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel per compilare JSX nel browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #F2F2F7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Componenti Icona SVG Manuali per massima compatibilità
        const Icons = {
            Play: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}>
                    <path d="M5 3l14 9-14 9V3z" />
                </svg>
            ),
            Pause: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}>
                    <rect x="6" y="4" width="4" height="16" />
                    <rect x="14" y="4" width="4" height="16" />
                </svg>
            ),
            RotateCcw: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                    <path d="M3 3v5h5" />
                </svg>
            ),
            FastForward: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}>
                    <path d="M13 19l9-7-9-7v14zM2 19l9-7-9-7v14z" />
                </svg>
            ),
            Volume2: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                </svg>
            ),
            VolumeX: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                    <line x1="23" y1="9" x2="17" y2="15" />
                    <line x1="17" y1="9" x2="23" y2="15" />
                </svg>
            ),
            GraduationCap: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
                    <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5" />
                </svg>
            )
        };

        const App = () => {
            const [timeLeft, setTimeLeft] = useState(25 * 60);
            const [isActive, setIsActive] = useState(false);
            const [mode, setMode] = useState('work');
            const [sessionsCompleted, setSessionsCompleted] = useState(0);
            const [isMuted, setIsMuted] = useState(false);
            const [thesisQuoteIndex, setThesisQuoteIndex] = useState(0);
            const [fadeStatus, setFadeStatus] = useState('fade-in');

            const thesisQuotes = [
                "Ogni parola scritta è un passo in più verso il titolo di Dottore.",
                "La bibliografia non si scriverà da sola, ma tu hai la forza per domarla.",
                "Non deve essere perfetto, deve essere finito.",
                "Il tuo contributo alla ricerca è unico. Continua a scavare.",
                "Scrivere la tesi è una maratona, non uno sprint.",
                "Ricorda perché hai iniziato: la tua curiosità ti guiderà.",
                "Un paragrafo al giorno toglie la proroga di torno!",
                "La tua tesi è la testimonianza della tua resilienza.",
                "Analizza i dati, scrivi i risultati, conquista il futuro.",
                "Pensa alla soddisfazione di stampare l'ultima pagina."
            ];

            useEffect(() => {
                const quoteInterval = setInterval(() => {
                    setFadeStatus('fade-out');
                    setTimeout(() => {
                        setThesisQuoteIndex((prev) => (prev + 1) % thesisQuotes.length);
                        setFadeStatus('fade-in');
                    }, 500);
                }, 4000);
                return () => clearInterval(quoteInterval);
            }, []);

            const settings = { work: 25 * 60, short: 5 * 60, long: 15 * 60 };
            const timerRef = useRef(null);

            useEffect(() => {
                if (isActive && timeLeft > 0) {
                    timerRef.current = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                } else if (timeLeft === 0) {
                    handleTimerComplete();
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [isActive, timeLeft]);

            const handleTimerComplete = () => {
                clearInterval(timerRef.current);
                setIsActive(false);
                if (mode === 'work') {
                    const newSessions = sessionsCompleted + 1;
                    setSessionsCompleted(newSessions);
                    newSessions % 4 === 0 ? switchMode('long') : switchMode('short');
                } else {
                    switchMode('work');
                }
            };

            const switchMode = (newMode) => {
                setMode(newMode);
                setTimeLeft(settings[newMode]);
                setIsActive(false);
            };

            const toggleTimer = () => setIsActive(!isActive);
            const resetTimer = () => { setIsActive(false); setTimeLeft(settings[mode]); };
            const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;

            const themes = { work: 'bg-[#FF3B30]', short: 'bg-[#34C759]', long: 'bg-[#007AFF]' };
            const accentColors = { work: 'text-[#FF3B30]', short: 'text-[#34C759]', long: 'text-[#007AFF]' };
            const progress = ((settings[mode] - timeLeft) / settings[mode]) * 100;
            const sessionsInCycle = sessionsCompleted % 4;

            return (
                <div className="min-h-screen flex items-center justify-center p-6 relative">
                    <div className={`fixed inset-0 opacity-10 transition-colors duration-1000 ${themes[mode]}`} />
                    
                    <div className="relative bg-white/90 backdrop-blur-2xl rounded-[2.5rem] p-10 shadow-2xl border border-white/50 w-full max-w-[400px]">
                        
                        <div className="flex justify-between items-center mb-8">
                            <button onClick={() => setIsMuted(!isMuted)} className="p-2.5 bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200 transition-colors">
                                {isMuted ? <Icons.VolumeX size={18} /> : <Icons.Volume2 size={18} />}
                            </button>
                            <div className="flex flex-col items-end">
                                <div className="text-[10px] font-semibold text-gray-400 uppercase tracking-widest mb-1">Progresso</div>
                                <div className="flex gap-1.5 p-1.5 bg-gray-100 rounded-full">
                                    {[1, 2, 3, 4].map(s => {
                                        // Calcolo visivo per mostrare 4 pallini quando si è finito un ciclo
                                        const displayStep = sessionsInCycle === 0 && sessionsCompleted > 0 ? 4 : sessionsInCycle;
                                        return (
                                            <div key={s} className={`w-2.5 h-2.5 rounded-full transition-all duration-500 ${s <= displayStep ? themes.work : 'bg-gray-300'} ${(s === 4 && sessionsInCycle === 0 && sessionsCompleted > 0) ? themes.long : ''}`} />
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        <div className="bg-gray-100/50 p-1 rounded-2xl flex mb-10">
                            {['work', 'short', 'long'].map(m => (
                                <button key={m} onClick={() => switchMode(m)} className={`flex-1 py-2 text-[13px] font-medium rounded-xl transition-all ${mode === m ? 'bg-white shadow-sm text-black' : 'text-gray-500 hover:text-gray-700'}`}>
                                    {m === 'work' ? 'Lavoro' : m === 'short' ? 'Pausa' : 'Lunga'}
                                </button>
                            ))}
                        </div>

                        <div className="relative flex justify-center items-center mb-10">
                            <svg className="w-60 h-60 transform -rotate-90">
                                <circle cx="120" cy="120" r="112" stroke="#E5E5EA" strokeWidth="6" fill="transparent" />
                                <circle cx="120" cy="120" r="112" stroke="currentColor" strokeWidth="6" fill="transparent"
                                    strokeDasharray={2 * Math.PI * 112} strokeDashoffset={2 * Math.PI * 112 * (1 - progress / 100)}
                                    strokeLinecap="round" className={`transition-all duration-1000 ${accentColors[mode]}`} />
                            </svg>
                            <div className="absolute inset-0 flex flex-col items-center justify-center">
                                <span className="text-[64px] font-light tracking-tight text-[#1C1C1E]">{formatTime(timeLeft)}</span>
                                <span className="text-[11px] font-semibold uppercase tracking-widest text-gray-400">
                                    {mode === 'work' ? 'Concentrazione' : 'Riposo'}
                                </span>
                            </div>
                        </div>

                        <div className="flex justify-between items-center px-4 mb-10">
                            <button onClick={resetTimer} className="p-4 bg-gray-100 rounded-full hover:bg-gray-200 transition-all active:scale-95 text-gray-600">
                                <Icons.RotateCcw size={22} />
                            </button>
                            <button onClick={toggleTimer} className={`w-20 h-20 flex items-center justify-center rounded-full text-white shadow-lg transition-all active:scale-95 ${themes[mode]}`}>
                                {isActive ? <Icons.Pause size={32} /> : <Icons.Play size={32} className="ml-1" />}
                            </button>
                            <button onClick={() => handleTimerComplete()} className="p-4 bg-gray-100 rounded-full hover:bg-gray-200 transition-all active:scale-95 text-gray-600">
                                <Icons.FastForward size={22} />
                            </button>
                        </div>

                        <div className="pt-6 border-t border-gray-100">
                            <div className="flex items-center justify-center gap-2 mb-4">
                                <Icons.GraduationCap size={16} className="text-gray-400" />
                                <span className="text-[10px] font-bold uppercase tracking-widest text-gray-400">Road to Ph.D.</span>
                            </div>
                            <div className="min-h-[60px] flex items-center justify-center">
                                <p className={`text-[#3A3A3C] text-[15px] text-center font-medium italic transition-all duration-700 ${fadeStatus === 'fade-in' ? 'opacity-100 blur-0 translate-y-0' : 'opacity-0 blur-sm translate-y-2'}`}>
                                    "{thesisQuotes[thesisQuoteIndex]}"
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
